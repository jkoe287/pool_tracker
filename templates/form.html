<!DOCTYPE html>
<html>
<head>
    <title>Pool Logger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h2>Water Test Entry</h2>
    <i>Please enter water test results:</i>
    <br><br>
    <form action="/submit" method="post" onsubmit="return validateForm()">
        <label>pH:</label><br>
        <input type="number" step="0.1" name="ph" required><br><br>

        <label>FAC:</label><br>
        <input type="number" step="0.1" name="fac" required><br><br>

        <label>Bather Load:</label><br>
        <input type="number" name="bather" required><br><br>

        <button type="submit">Submit</button>
    </form>
    
    <br>
    <a href="/graph">
        <button id="G1">View Graphs</button>
    </a>
</body>

<script>

    function validateForm() {
    const ph = parseFloat(document.querySelector('[name="ph"]').value);
    const fac = parseFloat(document.querySelector('[name="fac"]').value);

    let warnings = [];

    if (ph < 7.0 || ph > 8.0) {
        warnings.push("pH out of safe range (7 – 8)");
    }

    if (fac < 0.5 || fac > 3) {
        warnings.push("FAC out of safe range (0.5 – 3 mg/L)");
    }

    if (warnings.length > 0) {
        return confirm("Warning \n\n" + warnings.join("\n") + "\n\nSubmit anyway?");
    }

        return true;
    }

</script>

<style>
    input {
        width: 200px;
        padding: 12px;
        margin: 8px 0;
        display: inline-block;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }

    button {
    padding: 12px;
    margin: 8px 0;
    display: inline-block;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}
    #G1 {
        background-color: rgb(255, 255, 255);
    }
</style>

</html>
